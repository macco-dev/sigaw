name: Test

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: test-${{ forgejo.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04-amd64
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    env:
      DEBIAN_FRONTEND: noninteractive
      SIGAW_BUILD_DIR: /tmp/sigaw-build-${{ forgejo.run_number }}
      SIGAW_STAGE_DIR: /tmp/sigaw-stage-${{ forgejo.run_number }}
    steps:
      - name: Check out source
        uses: https://data.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: contrib/ci/bootstrap-deps.sh

      - name: Build, test, and stage install
        run: contrib/ci/build-test-install.sh
